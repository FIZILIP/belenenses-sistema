{% extends "base.html" %}

{% block content %}
<div class="table-container">
    <div class="table-header">
        <div class="chart-title">
            <i class="fas fa-key" style="color: #FFD700;"></i>
            Gerenciar Permissões de Usuários
        </div>
    </div>
    
    <div class="p-3">
        <div class="table-responsive">
            <table class="custom-table table">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Email</th>
                        <th>Admin</th>
                        <th>Atletas</th>
                        <th>Comissão</th>
                        <th>Financeiro</th>
                        <th>Inventário</th>
                        <th>Reuniões</th>
                        <th>Depto. Médico</th>
                        <th>Scouting</th>
                        <th>Documentos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for usuario in usuarios %}
                    <form method="POST" action="{{ url_for('atualizar_permissoes', id=usuario.id) }}">
                        <tr>
                            <td>{{ usuario.username }}</td>
                            <td>{{ usuario.email }}</td>
                            <td><input type="checkbox" name="is_admin" {% if usuario.is_admin %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_atletas" {% if usuario.can_manage_atletas %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_comissao" {% if usuario.can_manage_comissao %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_financeiro" {% if usuario.can_manage_financeiro %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_inventario" {% if usuario.can_manage_inventario %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_reunioes" {% if usuario.can_manage_reunioes %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_medico" {% if usuario.can_manage_medico %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_scouting" {% if usuario.can_manage_scouting %}checked{% endif %}></td>
                            <td><input type="checkbox" name="can_manage_documentos" {% if usuario.can_manage_documentos %}checked{% endif %}></td>
                            <td>
                                <button type="submit" class="btn btn-sm btn-primary">Salvar</button>
                            </td>
                        </tr>
                    </form>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
